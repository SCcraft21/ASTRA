<style>
        body {
            background-color: #0b1326;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(111, 0, 190, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(202, 129, 0, 0.1) 0%, transparent 40%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(45, 52, 73, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card-light {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .ambient-glow-primary {
            box-shadow: 0 0 60px rgba(128, 131, 255, 0.15);
        }

        .thinking-pulse {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        .canvas-stream::-webkit-scrollbar {
            display: none;
        }

        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center">

</div>
<div>
<p class="font-body-md text-body-md text-on-surface font-medium leading-tight">Contextual Core</p>
<p class="text-[12px] text-on-surface-variant">Active Learning</p>
</div>
</div>
</div>
<nav class="space-y-2">
<a class="flex items-center gap-4 px-4 py-3 text-secondary font-bold border-r-2 border-secondary hover:bg-white/5 transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
<span class="">History</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 text-on-surface-variant hover:bg-white/5 transition-colors" href="/memory">
<span class="material-symbols-outlined">psychology</span>

<a class="flex items-center gap-4 px-4 py-3 text-on-surface-variant hover:bg-white/5 transition-colors" href="/developer">

<div class="mt-auto pt-6 border-t border-white/5">
<div class="flex items-center gap-3 px-2">
<div class="w-2 h-2 rounded-full bg-primary thinking-pulse"></div>
<span class="text-body-sm font-body-sm text-on-surface-variant">System Optimal</span>
</div>
</div>
</aside>
<!-- Main Conversation Canvas -->
<main class="md:ml-72 pt-32 pb-48 px-4 md:px-margin-desktop min-h-screen">
<div class="max-w-4xl mx-auto space-y-12 canvas-stream">
<!-- Chat stream will be inserted here -->
</div>
</main>
<!-- Bottom Interaction Shell -->
<div class="fixed bottom-0 w-full flex justify-center pb-8 px-4 z-50">
<div class="w-full max-w-2xl relative">
<!-- Ambient Glow -->
<div class="absolute inset-0 bg-primary/20 blur-[80px] -z-10 rounded-full"></div>
<div class="glass-card-light rounded-full p-2 px-6 flex items-center gap-4 border-white/20 shadow-2xl focus-within:scale-[1.02] transition-transform duration-300">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined">attach_file</span>
</button>
<input id="chat-input" class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-on-surface-variant/50 font-user-prompt text-[16px] py-4" placeholder="Imagine something or ask a question..." type="text">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full glass-card flex items-center justify-center">
<span class="material-symbols-outlined text-[20px] text-secondary">mic</span>
</div>
<button id="submit-btn" class="bg-primary text-on-primary p-3 rounded-full shadow-lg hover:brightness-110 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;FILL&quot; 1;">auto_awesome</span>
</button>
</div>
</div>
<div class="mt-4 flex justify-center gap-6">
<button class="text-[12px] font-label-caps text-on-surface-variant hover:text-on-surface transition-colors">Cite Sources</button>
<button class="text-[12px] font-label-caps text-on-surface-variant hover:text-on-surface transition-colors">Visual Mode</button>
<button class="text-[12px] font-label-caps text-on-surface-variant hover:text-on-surface transition-colors">Context Settings</button>
</div>
</div>
</div>
<!-- Mobile Bottom Nav (Replaces SideNav on mobile) -->
<div class="md:hidden fixed bottom-0 w-full flex justify-around items-center p-4 bg-surface-container-low/40 backdrop-blur-3xl border-t border-white/5 z-50">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px]">History</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined">psychology</span>
<span class="text-[10px]">Memory</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined">handyman</span>
<span class="text-[10px]">Tools</span>
</button>
</div>
<script>
    const chatInput = document.getElementById('chat-input');
    const submitBtn = document.getElementById('submit-btn');
    const chatContainer = document.querySelector('.canvas-stream');

    async function sendMessage() {
        const query = chatInput.value.trim();
        if (!query) return;

        // Add user message
        const userHtml = `
        <div class="flex justify-end fade-in-up" style="animation-delay: 0.1s;">
            <div class="max-w-[80%] glass-card-light p-card-padding rounded-[32px] rounded-tr-none">
                <p class="font-user-prompt text-user-prompt text-on-surface">${query}</p>
            </div>
        </div>`;
        chatContainer.insertAdjacentHTML('beforeend', userHtml);
        chatInput.value = '';

        // Add loading indicator
        const loadingHtml = `
        <div id="loading-indicator" class="flex gap-4 fade-in-up" style="animation-delay: 0.1s;">
            <div class="flex-shrink-0 w-8 h-8 rounded-full glass-card-light flex items-center justify-center">
                <span class="material-symbols-outlined text-[18px] text-primary">auto_awesome</span>
            </div>
            <div class="flex flex-wrap gap-2 pt-1">
                <span class="px-3 py-1 rounded-full glass-card text-[12px] text-secondary border-secondary/20 thinking-pulse">Thinking...</span>
            </div>
        </div>`;
        chatContainer.insertAdjacentHTML('beforeend', loadingHtml);
        window.scrollTo(0, document.body.scrollHeight);

        try {
            // Use production URL if not on localhost
            const baseUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                ? 'http://localhost:8000' 
                : 'https://your-backend-app.onrender.com'; // TODO: Replace with your actual Render URL
            const apiUrl = `${baseUrl}/api/generate`;

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });

            const data = await response.json();
            
            // Remove loading
            const loadingIndicator = document.getElementById('loading-indicator');
            if (loadingIndicator) loadingIndicator.remove();

            // Add bot response
            const botHtml = `
            <div class="grid grid-cols-1 md:grid-cols-12 gap-8 fade-in-up" style="animation-delay: 0.1s;">
                <div class="md:col-span-11 glass-card p-card-padding rounded-[40px] shadow-2xl">
                    <div class="space-y-4">
                        <p class="font-body-md text-body-md leading-relaxed text-on-surface/90">
                            ${data.response}
                        </p>
                    </div>
                </div>
            </div>`;
            chatContainer.insertAdjacentHTML('beforeend', botHtml);
            window.scrollTo(0, document.body.scrollHeight);
        } catch (error) {
            const loadingIndicator = document.getElementById('loading-indicator');
            if (loadingIndicator) loadingIndicator.remove();
            
            console.error('Error:', error);
            const errorHtml = `
            <div class="grid grid-cols-1 md:grid-cols-12 gap-8 fade-in-up">
                <div class="md:col-span-11 glass-card p-card-padding rounded-[40px] shadow-2xl border border-error">
                    <p class="font-body-md text-body-md leading-relaxed text-error">
                        Connection error. Make sure the API server is running on port 8000.
                    </p>
                </div>
            </div>`;
            chatContainer.insertAdjacentHTML('beforeend', errorHtml);
            window.scrollTo(0, document.body.scrollHeight);
        }
    }

    submitBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
</script>
</body></html>
